<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript30 | Gunal K</title>

		<style>
			:root {
				--bg: #0f172a;
				--glass: rgba(255, 255, 255, 0.05);
				--border: rgba(255, 255, 255, 0.1);
				--text: #e2e8f0;
				--accent: #38bdf8;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "Segoe UI", sans-serif;
			}

			body {
				background: radial-gradient(circle at top, #1e293b, #020617);
				color: var(--text);
				min-height: 100vh;
			}

			/* NAVBAR */
			nav {
				display: flex;
				justify-content: space-between;
				padding: 20px 8%;
				backdrop-filter: blur(10px);
			}

			nav h2 {
				color: var(--accent);
			}

			nav a {
				text-decoration: none;
				color: var(--text);
				font-size: 0.9rem;
			}

			/* HERO */
			.hero {
				text-align: center;
				padding: 60px 20px 30px;
			}

			.hero h1 {
				font-size: 3rem;
				background: linear-gradient(90deg, #38bdf8, #818cf8);
				background-clip: text;
				-webkit-background-clip: text;
				color: transparent;
			}

			.hero p {
				margin-top: 10px;
				color: #94a3b8;
			}

			/* GRID */
			.container {
				width: 90%;
				max-width: 1100px;
				margin: 40px auto;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
				gap: 25px;
			}

			/* CARD */
			.card {
				background: var(--glass);
				border: 1px solid var(--border);
				backdrop-filter: blur(15px);
				border-radius: 15px;
				padding: 25px;
				text-decoration: none;
				text-align: center;
				color: white;
				transition: all 0.3s ease;
				position: relative;
				overflow: hidden;
			}

			.card::before {
				content: "";
				position: absolute;
				width: 120%;
				height: 120%;
				background: linear-gradient(
					120deg,
					transparent,
					rgba(56, 189, 248, 0.3),
					transparent
				);
				top: -10%;
				left: -10%;
				transform: rotate(25deg);
				opacity: 0;
				transition: 0.5s;
			}

			.card:hover::before {
				opacity: 1;
			}

			.card:hover {
				transform: translateY(-8px) scale(1.02);
				box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
				border-color: rgba(56, 189, 248, 0.4);
			}

			.card h3 {
				margin-bottom: 10px;
				font-size: 1.2rem;
			}

			.card p {
				font-size: 0.9rem;
				color: #94a3b8;
			}

			/* FOOTER */
			footer {
				text-align: center;
				margin: 40px 0 20px;
				font-size: 0.85rem;
				color: #64748b;
			}

			/* BUTTON */
			.btn {
				display: inline-block;
				margin-top: 20px;
				padding: 10px 20px;
				border-radius: 25px;
				background: linear-gradient(90deg, #38bdf8, #6366f1);
				color: white;
				text-decoration: none;
				transition: 0.3s;
			}

			.btn:hover {
				transform: scale(1.05);
			}
		</style>
	</head>

	<body>
		<!-- NAV -->
		<nav>

					alt=""

		</nav>

		<!-- HERO -->

			<a
				href="https://github.com/Gunal-k/JavaScript30"
